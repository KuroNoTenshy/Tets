name: Build Timer.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Instalar dependências
        run: |
          pip install pyinstaller pillow

      - name: Compilar Timer.exe
        run: |
          pyinstaller --onefile --noconsole --name "Timer" timer.py

      - name: Upload Timer.exe
        uses: actions/upload-artifact@v4
        with:
          name: Timer-Windows-x64
          path: dist/Timer.exe
